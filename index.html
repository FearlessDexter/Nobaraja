<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nobarcuy</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    :fullscreen { background-color: black; }
    ::backdrop { background-color: black; }
  </style>
</head>
<body class="bg-gray-950 text-white">

  <div id="root"></div>

  <!-- FIREBASE MODULES -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    window.FB = { initializeApp, getAuth, signInAnonymously, getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc };
    window.dispatchEvent(new Event('firebase-loaded'));
  </script>

  <!-- SCRIPT APLIKASI -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
      // KONFIGURASI FIREBASE
const firebaseConfig = {
  apiKey: "MASUKKAN_API_KEY_FIREBASE_DI_SINI",
  authDomain: "MASUKKAN_AUTH_DOMAIN_DI_SINI",
  projectId: "MASUKKAN_PROJECT_ID_DI_SINI",
  storageBucket: "MASUKKAN_STORAGE_BUCKET_DI_SINI",
  messagingSenderId: "MASUKKAN_SENDER_ID_DI_SINI",
  appId: "MASUKKAN_APP_ID_DI_SINI"
};
  
    

    const PRESET_VIDEOS = [
      { id: 'custom', name: '🔗 Tempel Link Sendiri' },
      { id: 'vid1', name: '🎬 Trailer YouTube Biasa', url: 'https://www.youtube.com/watch?v=aqz-KE-bpKQ' },
      { id: 'vid2', name: '🎬 Film Pendek MP4 (Tersinkron)', url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4' }
    ];

    function App() {
      const [view, setView] = useState('home');
      const [username, setUsername] = useState('');
      const [roomId, setRoomId] = useState('');
      
      const [videoUrl, setVideoUrl] = useState('');
      const [selectedPreset, setSelectedPreset] = useState(PRESET_VIDEOS[2].id);
      const [isEmbedMode, setIsEmbedMode] = useState(false); 
      
      const [roomData, setRoomData] = useState(null);
      const [isHost, setIsHost] = useState(false);
      const [hasInteracted, setHasInteracted] = useState(false);
      
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [toast, setToast] = useState(null);
      const [dbInstance, setDbInstance] = useState(null);
      
      const messagesEndRef = useRef(null);
      const videoContainerRef = useRef(null);
      const videoRef = useRef(null); 

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        if (roomParam) setRoomId(roomParam);
      }, []);

      useEffect(() => {
        if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      // --- SETUP DATABASE ---
      useEffect(() => {
        let unsubState = null;
        let unsubMsgs = null;

        const connectDB = async () => {
          if (!window.FB) return;
          try {
            const app = window.FB.initializeApp(firebaseConfig);
            const auth = window.FB.getAuth(app);
            const db = window.FB.getFirestore(app);

            const userCredential = await window.FB.signInAnonymously(auth);
            const uid = userCredential.user.uid;
            setDbInstance(db);

            const roomRef = window.FB.doc(db, "rooms", roomId);
            const roomSnap = await window.FB.getDoc(roomRef);
            let userIsHost = false;
            
            if (!roomSnap.exists()) {
              userIsHost = true;
              setIsHost(true);
              setHasInteracted(true);
              await window.FB.setDoc(roomRef, { 
                hostUid: uid,
                hostName: username,
                media: { type: 'video', url: PRESET_VIDEOS[2].url, isEmbed: false },
                playback: { playing: false, time: 0, updateAt: Date.now() }
              });
              showToast("👑 Anda adalah Admin Utama.");
            } else {
              const data = roomSnap.data();
              if (data.hostUid === uid) {
                userIsHost = true;
                setIsHost(true);
                setHasInteracted(true);
                showToast("👑 Anda kembali sebagai Admin.");
              } else {
                userIsHost = false;
                setIsHost(false);
                showToast(`👁️ Bergabung sbg Penonton. Admin: ${data.hostName}`);
              }
            }

            unsubState = window.FB.onSnapshot(roomRef, (docSnap) => {
              if (docSnap.exists()) {
                const data = docSnap.data();
                setRoomData(data);
                
                if (!userIsHost && data.media?.type === 'video' && data.playback && videoRef.current) {
                  const vid = videoRef.current;
                  const currentTime = vid.currentTime || 0;
                  const dbTime = data.playback.time;
                  
                  if (Math.abs(currentTime - dbTime) > 2) {
                    vid.currentTime = dbTime;
                  }
                  
                  if (data.playback.playing && vid.paused) {
                    vid.play().catch(() => {});
                  } else if (!data.playback.playing && !vid.paused) {
                    vid.pause();
                  }
                }
              }
            });

            const msgsRef = window.FB.collection(db, `messages_${roomId}`);
            unsubMsgs = window.FB.onSnapshot(msgsRef, (snap) => {
              const loadedMsgs = [];
              snap.forEach(d => loadedMsgs.push(d.data()));
              loadedMsgs.sort((a,b) => a.timestamp - b.timestamp);
              setMessages(loadedMsgs);
            });

          } catch (e) {
            console.error(e);
            if (e.code === 'auth/unauthorized-domain') {
               showToast("❌ GAGAL: Domain GitHub belum didaftarkan di Firebase Auth!");
            } else {
               showToast("❌ Error Koneksi: " + e.message);
            }
          }
        };

        if (view === 'room' && roomId) {
          if (window.FB) connectDB();
          else window.addEventListener('firebase-loaded', connectDB);
        }

        return () => {
          if (unsubMsgs) unsubMsgs();
          if (unsubState) unsubState();
          window.removeEventListener('firebase-loaded', connectDB);
        };
      }, [view, roomId, username]);

      // --- FUNGSI ADMIN ---
      const parseUrl = (url, forceEmbed) => {
        if (!url) return null;
        const cleanUrl = url.trim();
        if (forceEmbed) return { type: 'embed', url: cleanUrl };
        
        // PENDETEKSI YOUTUBE (Diperbarui untuk mendukung YT Live)
        const ytRegex = /(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|live\/|watch\?v=|watch\?.+&v=|shorts\/))([\w-]{11})/;
        const ytMatch = cleanUrl.match(ytRegex);
        if (ytMatch) return { type: 'youtube', id: ytMatch[1], url: cleanUrl };
        
        return { type: 'video', url: cleanUrl };
      };

      const updateMediaInDb = async (url, forceEmbed) => {
        if (dbInstance && roomId && isHost) {
          const mediaObj = parseUrl(url, forceEmbed);
          if (!mediaObj) return;
          try {
            const roomRef = window.FB.doc(dbInstance, "rooms", roomId);
            await window.FB.setDoc(roomRef, { 
              media: mediaObj,
              playback: { playing: true, time: 0, updateAt: Date.now() }
            }, { merge: true });
          } catch(e) {}
        }
      };

      const syncPlaybackToDb = async (isPlaying, time) => {
        if (dbInstance && roomId && isHost) {
          try {
            const roomRef = window.FB.doc(dbInstance, "rooms", roomId);
            await window.FB.setDoc(roomRef, { 
              playback: { playing: isPlaying, time: time, updateAt: Date.now() }
            }, { merge: true });
          } catch(e) {}
        }
      };

      const handlePresetChange = (e) => {
        if(!isHost) return;
        const presetId = e.target.value;
        setSelectedPreset(presetId);
        setIsEmbedMode(false); 
        
        if (presetId === 'custom') {
          setVideoUrl('');
        } else {
          const preset = PRESET_VIDEOS.find(p => p.id === presetId);
          if (preset) {
            setVideoUrl(preset.url);
            updateMediaInDb(preset.url, false);
          }
        }
      };

      const handleUrlSubmit = () => {
        if(!isHost || !videoUrl.trim()) return;
        updateMediaInDb(videoUrl.trim(), isEmbedMode);
      };

      const toggleFullscreen = () => {
        if (!videoContainerRef.current) return;
        if (!document.fullscreenElement) {
          videoContainerRef.current.requestFullscreen().then(() => {
            if (window.screen.orientation && window.screen.orientation.lock) {
              window.screen.orientation.lock('landscape').catch(() => {});
            }
          }).catch(() => showToast(`Gagal Layar Penuh`));
        } else {
          document.exitFullscreen().then(() => {
            if (window.screen.orientation && window.screen.orientation.unlock) {
              window.screen.orientation.unlock();
            }
          });
        }
      };

      const showToast = (message) => {
        setToast(message);
        setTimeout(() => setToast(null), 5000); 
      };

      // --- LOGIKA CHAT & JOIN ---
      const handleJoin = (e) => {
        e.preventDefault();
        if (!username.trim()) return showToast('Silakan masukkan nama Anda!');
        const finalRoomId = roomId.trim() || Math.random().toString(36).substring(2, 8).toUpperCase();
        setRoomId(finalRoomId);
        setView('room');
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!newMessage.trim() || !dbInstance || !roomId) return;
        const msgData = {
          id: Date.now(), user: username, text: newMessage, isSystem: false,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          timestamp: Date.now(), isHost: isHost
        };
        try {
          const msgsRef = window.FB.collection(dbInstance, `messages_${roomId}`);
          await window.FB.addDoc(msgsRef, msgData);
          setNewMessage('');
        } catch(e) {}
      };

      const copyInviteLink = () => {
        const inviteLink = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
        const textArea = document.createElement("textarea");
        textArea.value = inviteLink;
        document.body.appendChild(textArea);
        textArea.select();
        try { document.execCommand('copy'); showToast('Link ruangan disalin!'); } 
        catch (err) {} document.body.removeChild(textArea);
      };

      const handleViewerInteraction = () => {
        setHasInteracted(true);
        if (videoRef.current) {
           videoRef.current.play().catch(()=>{});
        }
      };

      const Toast = () => {
        if (!toast) return null;
        return (
          <div className="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-800 border border-gray-700 text-white px-5 py-3 rounded-full shadow-2xl flex items-center space-x-3 z-50 font-medium text-sm w-max max-w-[90vw] transition-opacity">
            <i className="fa-solid fa-bell text-indigo-400"></i>
            <span>{toast}</span>
          </div>
        );
      };

      if (view === 'home') {
        return (
          <div className="min-h-screen bg-gray-950 flex items-center justify-center p-4 text-white font-sans">
            <Toast />
            <div className="bg-gray-900 border border-gray-800 rounded-3xl shadow-2xl p-8 w-full max-w-md relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-600"></div>
              <div className="flex flex-col items-center mb-8">
                <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-4 rounded-2xl mb-4 shadow-lg shadow-indigo-500/30">
                  <i className="fa-solid fa-film text-3xl text-white"></i>
                </div>
                <h1 className="text-3xl font-extrabold text-white mb-2">Nobarcuy</h1>
                <p className="text-gray-400 text-sm text-center">Tonton video bareng. Pembuat room otomatis menjadi Admin.</p>
              </div>
              <form onSubmit={handleJoin} className="space-y-5">
                <div>
                  <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nama Kamu</label>
                  <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full px-4 py-3.5 bg-gray-950 border border-gray-700 rounded-xl focus:ring-2 focus:ring-indigo-500 text-white outline-none" placeholder="Misal: Budi" required />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Kode Ruangan (Opsional)</label>
                  <input type="text" value={roomId} onChange={(e) => setRoomId(e.target.value.toUpperCase())} className="w-full px-4 py-3.5 bg-gray-950 border border-gray-700 rounded-xl focus:ring-2 focus:ring-indigo-500 text-white uppercase outline-none font-mono" placeholder="Kosongkan untuk buat room baru" />
                </div>
                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all flex justify-center items-center space-x-2">
                  <span>Masuk Ruangan</span>
                  <i className="fa-solid fa-right-to-bracket"></i>
                </button>
              </form>
            </div>
          </div>
        );
      }

      const currentMedia = roomData?.media;

      return (
        <div className="min-h-screen bg-gray-950 flex flex-col text-white font-sans overflow-hidden">
          <Toast />
          
          <header className="bg-gray-900 border-b border-gray-800 px-5 py-3 flex items-center justify-between shrink-0 z-20">
            <div className="flex items-center space-x-3">
              <h1 className="text-lg font-bold">Nobarcuy</h1>
              {isHost ? (
                <span className="bg-yellow-500/20 text-yellow-400 text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-wider border border-yellow-500/30 flex items-center space-x-1"><i className="fa-solid fa-crown text-[8px]"></i> <span>Admin</span></span>
              ) : (
                <span className="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-wider border border-blue-500/30 flex items-center space-x-1"><i className="fa-solid fa-eye text-[8px]"></i> <span>Penonton</span></span>
              )}
            </div>
            
            <div className="flex items-center space-x-3">
              <div className="bg-gray-950 px-4 py-2 rounded-lg flex items-center space-x-2 border border-gray-800 cursor-pointer hover:bg-gray-800 transition-colors" onClick={copyInviteLink}>
                <span className="text-xs text-gray-500 font-medium uppercase tracking-wider hidden sm:inline">Room:</span>
                <span className="font-mono font-bold text-indigo-400 tracking-wider">{roomId}</span>
                <i className="fa-regular fa-copy text-gray-500 text-xs ml-2"></i>
              </div>
            </div>
          </header>

          <main className="flex-1 flex flex-col lg:flex-row overflow-hidden">
            
            <div className="flex-1 flex flex-col bg-black overflow-y-auto relative">
              
              {/* WADAH VIDEO */}
              <div ref={videoContainerRef} className="w-full aspect-video lg:aspect-auto lg:h-[65vh] bg-black relative flex items-center justify-center group overflow-hidden">
                
                {/* TOMBOL BYPASS AUTOPLAY BROWSER UNTUK PENONTON BARU */}
                {!isHost && !hasInteracted && (
                  <div onClick={handleViewerInteraction} className="absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center cursor-pointer backdrop-blur-sm">
                    <div className="bg-indigo-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex flex-col items-center transform transition hover:scale-105">
                      <i className="fa-solid fa-play text-4xl mb-3"></i>
                      <span className="font-bold text-lg">Mulai Menonton</span>
                      <span className="text-xs text-indigo-200 mt-1">Ketuk untuk izinkan browser memutar video</span>
                    </div>
                  </div>
                )}

                {!currentMedia ? (
                  <div className="text-gray-500 flex flex-col items-center">
                    <i className="fa-solid fa-spinner fa-spin text-4xl mb-4"></i>
                    <p>Memuat Video...</p>
                  </div>
                ) : currentMedia.type === 'embed' ? (
                  <iframe 
                    src={currentMedia.url}
                    className="absolute inset-0 w-full h-full border-0"
                    allowFullScreen
                    sandbox="allow-scripts allow-same-origin allow-presentation allow-popups"
                  ></iframe>
                ) : currentMedia.type === 'youtube' ? (
                  <iframe
                    src={`https://www.youtube.com/embed/${currentMedia.id}?autoplay=1`}
                    className="absolute inset-0 w-full h-full border-0"
                    allowFullScreen
                    title="YouTube Player"
                  ></iframe>
                ) : (
                  <video 
                    ref={videoRef}
                    src={currentMedia.url}
                    controls={true}
                    autoPlay
                    playsInline
                    className="absolute inset-0 w-full h-full object-contain bg-black outline-none"
                    onPlay={() => { if(isHost && videoRef.current) syncPlaybackToDb(true, videoRef.current.currentTime); }}
                    onPause={() => { if(isHost && videoRef.current) syncPlaybackToDb(false, videoRef.current.currentTime); }}
                    onSeeked={() => { if(isHost && videoRef.current) syncPlaybackToDb(!videoRef.current.paused, videoRef.current.currentTime); }}
                  />
                )}
              </div>
              
              {/* TOOLBAR BAWAH VIDEO */}
              <div className="bg-gray-800 border-b border-gray-700 px-4 py-2.5 flex justify-between items-center shrink-0">
                <div className="flex items-center space-x-3 truncate pr-4">
                  {currentMedia?.type === 'embed' ? (
                    <i className="fa-solid fa-window-restore text-orange-400"></i>
                  ) : currentMedia?.type === 'youtube' ? (
                    <i className="fa-brands fa-youtube text-red-500"></i>
                  ) : (
                    <i className="fa-solid fa-play text-indigo-400"></i>
                  )}
                  <span className="text-sm font-medium text-gray-300 truncate">
                    {currentMedia?.type === 'embed' ? 'Web Streaming (Klik Play Manual)' : currentMedia?.type === 'youtube' ? 'YouTube / Live (Klik Play Manual)' : 'Video Asli (Tersinkron Otomatis)'}
                  </span>
                </div>
                <button onClick={toggleFullscreen} className="bg-gray-700 hover:bg-gray-600 text-white text-xs px-4 py-2 rounded-lg font-bold transition-all flex items-center space-x-2 shrink-0 border border-gray-600">
                  <i className="fa-solid fa-expand"></i>
                  <span className="hidden sm:inline">Layar Penuh</span>
                </button>
              </div>
              
              {/* PANEL KONTROL ADMIN */}
              {isHost ? (
                <div className="p-6 bg-gray-900 border-b border-gray-800">
                  <div className="flex items-center space-x-2 mb-4">
                    <i className="fa-solid fa-sliders text-yellow-400"></i>
                    <h3 className="text-sm font-bold text-white uppercase tracking-wider">Panel Kontrol Admin</h3>
                  </div>
                  
                  <div className="grid gap-4 md:grid-cols-2">
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Pilih Video Tersedia</label>
                      <select 
                        value={selectedPreset}
                        onChange={handlePresetChange}
                        className="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-500 text-sm text-white"
                      >
                        {PRESET_VIDEOS.map(preset => (
                          <option key={preset.id} value={preset.id}>{preset.name}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">Gunakan Link Sendiri</label>
                      <div className="flex space-x-2 mb-2">
                        <input
                          type="text"
                          value={videoUrl}
                          onChange={(e) => { setVideoUrl(e.target.value); setSelectedPreset('custom'); }}
                          className="flex-1 px-4 py-3 bg-gray-950 border border-gray-700 rounded-xl focus:outline-none focus:border-yellow-500 text-sm text-gray-200"
                          placeholder="Link YouTube Live / MP4 / Embed..."
                        />
                        <button onClick={handleUrlSubmit} className="bg-yellow-600 hover:bg-yellow-500 text-gray-900 font-bold px-4 py-2 rounded-xl transition-colors">
                          Ganti
                        </button>
                      </div>
                      
                      <label className="flex items-center space-x-2 cursor-pointer mt-3">
                        <input 
                          type="checkbox" 
                          checked={isEmbedMode}
                          onChange={(e) => setIsEmbedMode(e.target.checked)}
                          className="w-4 h-4 text-yellow-500 bg-gray-900 border-gray-700 rounded focus:ring-yellow-500"
                        />
                        <span className="text-xs text-gray-400">Centang jika ini Link Web Film Pihak Ketiga (LK21/dsb)</span>
                      </label>

                    </div>
                  </div>
                </div>
              ) : (
                <div className="p-6 bg-gray-900 flex flex-col items-center justify-center text-gray-500 text-sm">
                  <i className="fa-solid fa-lock text-2xl mb-2 opacity-50"></i>
                  <p>Hanya Admin (<span className="text-gray-300 font-bold">{roomData?.hostName}</span>) yang dapat mengganti link.</p>
                </div>
              )}
            </div>

            {/* PANEL CHAT */}
            <div className="w-full lg:w-[380px] bg-gray-900 border-l border-gray-800 flex flex-col h-[60vh] lg:h-full shrink-0">
              <div className="p-4 border-b border-gray-800 flex items-center justify-between shrink-0 bg-gray-900 z-10 shadow-sm">
                <div className="flex items-center space-x-2">
                  <i className="fa-solid fa-message text-indigo-400"></i>
                  <h2 className="font-bold text-gray-100">Obrolan Ruangan</h2>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-4 space-y-5 bg-gray-950/30">
                {messages.map((msg) => (
                  <div key={msg.id} className={`flex flex-col ${msg.user === username ? 'items-end' : 'items-start'}`}>
                      <div className={`max-w-[85%] ${msg.user === username ? 'flex flex-col items-end' : 'flex flex-col items-start'}`}>
                        <span className="text-[10px] text-gray-500 mb-1 px-1 flex items-center space-x-1.5 font-medium uppercase tracking-wider">
                          {msg.isHost && <i className="fa-solid fa-crown text-yellow-500 text-[8px]"></i>}
                          <span>{msg.user === username ? 'Kamu' : msg.user}</span>
                          <span className="w-1 h-1 bg-gray-700 rounded-full"></span>
                          <span>{msg.time}</span>
                        </span>
                        <div className={`px-4 py-2.5 rounded-2xl text-sm break-words shadow-sm ${
                          msg.user === username 
                            ? 'bg-indigo-600 text-white rounded-tr-none' 
                            : 'bg-gray-800 text-gray-100 rounded-tl-none border border-gray-700'
                        }`}>
                          {msg.text}
                        </div>
                      </div>
                  </div>
                ))}
                <div ref={messagesEndRef} />
              </div>

              <form onSubmit={handleSendMessage} className="p-4 bg-gray-900 border-t border-gray-800 shrink-0">
                <div className="relative flex items-center">
                  <input
                    type="text"
                    value={newMessage}
                    onChange={(e) => setNewMessage(e.target.value)}
                    placeholder="Ketik pesan..."
                    className="w-full bg-gray-950 border border-gray-700 rounded-xl pl-4 pr-12 py-3.5 focus:outline-none focus:border-indigo-500 text-sm text-white"
                  />
                  <button type="submit" disabled={!newMessage.trim()} className="absolute right-2 p-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 disabled:opacity-50 transition-all flex items-center justify-center">
                    <i className="fa-solid fa-paper-plane"></i>
                  </button>
                </div>
              </form>
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
